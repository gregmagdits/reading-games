<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shooting Words</title>
    <style>
      :root {
        color-scheme: light;
        --sky-top: #07162f;
        --sky-mid: #112c55;
        --grass: #1f5a3c;
        --grass-dark: #123522;
        --ink: #17202a;
        --panel: #ffffff;
        --laser: #ff294c;
        --laser-glow: rgba(255, 41, 76, 0.45);
        --barrel: #42515f;
        --barrel-dark: #202a33;
        --orange: #f18f01;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        background: var(--sky-top);
      }

      button {
        font: inherit;
      }

      .arena {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 460px;
        overflow: hidden;
        background:
          radial-gradient(circle at 14% 15%, rgba(255, 255, 230, 0.95) 0 36px, rgba(255, 255, 230, 0) 37px),
          radial-gradient(circle at 28% 18%, rgba(255, 255, 255, 0.9) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 46% 10%, rgba(255, 255, 255, 0.8) 0 1px, rgba(255, 255, 255, 0) 2px),
          radial-gradient(circle at 62% 22%, rgba(255, 255, 255, 0.82) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 81% 13%, rgba(255, 255, 255, 0.78) 0 1px, rgba(255, 255, 255, 0) 2px),
          radial-gradient(circle at 91% 30%, rgba(255, 255, 255, 0.72) 0 2px, rgba(255, 255, 255, 0) 3px),
          linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 60%, #163c3e 82%, var(--grass) 82%, var(--grass-dark) 100%);
        cursor: crosshair;
      }

      .word-layer,
      .laser-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .word-layer {
        z-index: 2;
      }

      .laser-layer {
        z-index: 7;
      }

      .fireworks-canvas {
        position: absolute;
        inset: 0;
        z-index: 5;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .word-token {
        position: absolute;
        min-width: clamp(110px, 18vw, 190px);
        padding: clamp(10px, 1.6vw, 16px) clamp(16px, 2.2vw, 26px);
        border: 4px solid #17202a;
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(23, 32, 42, 0.22);
        font-size: clamp(38px, 7vmin, 76px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        text-align: center;
        transform: translate(-50%, -50%);
        user-select: none;
        pointer-events: auto;
        will-change: transform, opacity;
      }

      .word-token.flash {
        animation: word-flash 1.15s ease-in-out infinite;
      }

      .sound-button {
        position: absolute;
        top: clamp(16px, 3vh, 28px);
        right: clamp(16px, 3vw, 28px);
        z-index: 8;
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 3px solid #17202a;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(23, 32, 42, 0.18);
        cursor: pointer;
        font-size: 30px;
      }

      .sound-button[hidden] {
        display: none;
      }

      .settings-toggle {
        position: absolute;
        right: clamp(16px, 3vw, 28px);
        bottom: clamp(16px, 3vw, 28px);
        z-index: 32;
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 3px solid #17202a;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(23, 32, 42, 0.28);
        color: #17202a;
        cursor: pointer;
        font-size: 30px;
      }

      .settings-panel {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 31;
        width: min(420px, 100vw);
        padding: 22px;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.96);
        border-left: 3px solid #17202a;
        box-shadow: -18px 0 42px rgba(0, 0, 0, 0.28);
        transform: translateX(104%);
        transition: transform 220ms ease-out;
      }

      .settings-panel.open {
        transform: translateX(0);
      }

      .settings-panel[hidden] {
        display: block;
      }

      .settings-form {
        display: grid;
        gap: 16px;
      }

      .settings-form[hidden],
      .confirm-clear[hidden] {
        display: none;
      }

      .settings-title {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .field {
        display: grid;
        gap: 7px;
        font-size: 16px;
        font-weight: 700;
      }

      .field input,
      .field select {
        width: 100%;
        border: 2px solid #7d8791;
        border-radius: 8px;
        padding: 10px 12px;
        background: #ffffff;
        color: #17202a;
        font: inherit;
        font-weight: 500;
      }

      .field select {
        min-height: 128px;
      }

      .field input:disabled,
      .field select:disabled {
        background: #edf0f2;
        color: #6b7280;
      }

      .radio-group {
        display: grid;
        gap: 8px;
        border: 0;
        margin: 0;
        padding: 0;
      }

      .radio-group legend {
        margin-bottom: 2px;
        font-size: 16px;
        font-weight: 800;
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 16px;
        font-weight: 600;
      }

      .radio-option input {
        width: 18px;
        height: 18px;
      }

      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .settings-action {
        min-height: 44px;
        border: 2px solid #17202a;
        border-radius: 8px;
        padding: 9px 13px;
        background: #ffffff;
        color: #17202a;
        cursor: pointer;
        font-weight: 800;
      }

      .settings-action.primary {
        background: #17202a;
        color: #ffffff;
      }

      .settings-action.danger {
        border-color: #a8281e;
        color: #7c2119;
      }

      .settings-action:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .settings-status {
        min-height: 22px;
        color: #374151;
        font-size: 15px;
        line-height: 1.35;
      }

      .settings-status.error-text {
        color: #9f241b;
      }

      .confirm-clear {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 2px solid #a8281e;
        border-radius: 8px;
        background: #fff1ee;
      }

      .start-screen {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.36);
        backdrop-filter: blur(3px);
      }

      .start-screen[hidden] {
        display: none;
      }

      .start-button {
        min-width: 190px;
        min-height: 88px;
        border: 4px solid #17202a;
        border-radius: 8px;
        background: #ffffff;
        color: #17202a;
        box-shadow: 0 16px 34px rgba(23, 32, 42, 0.24);
        cursor: pointer;
        font-size: clamp(34px, 7vw, 58px);
        font-weight: 900;
      }

      .start-button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .error {
        position: absolute;
        inset: auto clamp(18px, 5vw, 64px) 26vh;
        z-index: 25;
        padding: 18px;
        border: 3px solid #9f241b;
        border-radius: 8px;
        background: #fff1ee;
        color: #62170f;
        font-size: 18px;
        line-height: 1.35;
      }

      .error[hidden] {
        display: none;
      }

      .laser-shot {
        position: absolute;
        left: 0;
        top: 0;
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, #ffffff, var(--laser) 32%, #b80628);
        box-shadow: 0 0 12px var(--laser-glow), 0 0 24px var(--laser-glow);
        transform-origin: 0 50%;
        animation: laser-fade 170ms ease-out forwards;
      }

      .spark {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ffe066;
        box-shadow: 0 0 16px rgba(255, 224, 102, 0.85);
        transform: translate(-50%, -50%);
        animation: spark-pop 260ms ease-out forwards;
      }

      .gun {
        position: absolute;
        left: 50%;
        bottom: 0;
        z-index: 6;
        width: clamp(150px, 22vmin, 210px);
        height: clamp(132px, 20vmin, 174px);
        transform: translateX(-50%);
        pointer-events: none;
      }

      .barrel {
        position: absolute;
        left: 50%;
        bottom: 54px;
        width: clamp(20px, 3.2vmin, 30px);
        height: clamp(90px, 14vmin, 126px);
        border: 3px solid #17202a;
        border-radius: 999px 999px 10px 10px;
        background: linear-gradient(90deg, var(--barrel-dark), var(--barrel), #718091);
        transform: translateX(-50%) rotate(0rad);
        transform-origin: 50% calc(100% - 8px);
        box-shadow: inset 0 10px 16px rgba(255, 255, 255, 0.14);
      }

      .barrel-tip {
        position: absolute;
        top: -8px;
        left: 50%;
        width: 32px;
        height: 18px;
        border: 3px solid #17202a;
        border-radius: 999px;
        background: #d9e1e8;
        transform: translateX(-50%);
      }

      .gun-pivot {
        position: absolute;
        left: 50%;
        bottom: 62px;
        width: 1px;
        height: 1px;
      }

      .gun-body {
        position: absolute;
        left: 50%;
        bottom: 16px;
        width: clamp(116px, 17vmin, 154px);
        height: clamp(58px, 8vmin, 78px);
        border: 4px solid #17202a;
        border-radius: 40px 40px 14px 14px;
        background: linear-gradient(180deg, #ffca3a, var(--orange));
        transform: translateX(-50%);
        box-shadow: 0 10px 0 rgba(23, 32, 42, 0.1);
      }

      .gun-body::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 16px;
        width: 46%;
        height: 22px;
        border: 3px solid #17202a;
        border-radius: 999px;
        background: #ffffff;
        transform: translateX(-50%);
      }

      .stand {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: clamp(76px, 12vmin, 106px);
        height: 28px;
        border: 4px solid #17202a;
        border-bottom: 0;
        border-radius: 18px 18px 0 0;
        background: #3d5a80;
        transform: translateX(-50%);
      }

      @keyframes laser-fade {
        to {
          opacity: 0;
          transform: var(--laser-transform) scaleX(0.86);
        }
      }

      @keyframes spark-pop {
        to {
          opacity: 0;
          transform: translate(-50%, -50%) scale(2.4);
        }
      }

      @keyframes word-flash {
        0%,
        100% {
          background: #ffffff;
          box-shadow: 0 12px 28px rgba(23, 32, 42, 0.22);
        }

        50% {
          background: #fff07a;
          box-shadow: 0 0 0 8px rgba(255, 240, 122, 0.22), 0 12px 28px rgba(23, 32, 42, 0.22);
        }
      }

      @media (max-width: 640px) {
        .arena {
          min-height: 420px;
        }

        .word-token {
          min-width: 98px;
          border-width: 3px;
        }

        .sound-button {
          width: 52px;
          height: 52px;
          font-size: 27px;
        }
      }
    </style>
  </head>
  <body>
    <main id="arena" class="arena" aria-label="Shooting words game">
      <div id="wordLayer" class="word-layer"></div>
      <div id="laserLayer" class="laser-layer"></div>
      <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>

      <button id="soundButton" class="sound-button" type="button" aria-label="Hear the word again" hidden>🔊</button>

      <div id="gun" class="gun" aria-hidden="true">
        <div id="barrel" class="barrel">
          <div class="barrel-tip"></div>
        </div>
        <div id="gunPivot" class="gun-pivot"></div>
        <div class="gun-body"></div>
        <div class="stand"></div>
      </div>

      <div id="startScreen" class="start-screen">
        <button id="startButton" class="start-button" type="button" disabled>Start</button>
      </div>

      <div id="error" class="error" role="alert" hidden></div>

      <button id="settingsToggle" class="settings-toggle" type="button" aria-label="Open settings">⚙</button>

      <aside id="settingsPanel" class="settings-panel" aria-label="Game settings" aria-hidden="true">
        <form id="passwordForm" class="settings-form">
          <h2 class="settings-title">Settings</h2>
          <label class="field">
            Password
            <input id="settingsPassword" type="password" autocomplete="current-password">
          </label>
          <div id="passwordStatus" class="settings-status" aria-live="polite"></div>
        </form>

        <form id="settingsForm" class="settings-form" hidden>
          <h2 class="settings-title">Word Data</h2>
          <div class="settings-actions">
            <button id="importButton" class="settings-action" type="button">Import data</button>
            <button id="clearDatabaseButton" class="settings-action danger" type="button">Clear database</button>
          </div>
          <input id="importFileInput" type="file" accept=".csv,text/csv" hidden>

          <div id="confirmClear" class="confirm-clear" hidden>
            <div>Are you sure you want to clear the data?</div>
            <div class="settings-actions">
              <button id="confirmClearYes" class="settings-action danger" type="button">Yes</button>
              <button id="confirmClearCancel" class="settings-action" type="button">Cancel</button>
            </div>
          </div>

          <label class="field">
            Section(s)
            <select id="sectionSelect" multiple disabled></select>
          </label>

          <label class="field">
            Lesson(s)
            <select id="lessonSelect" multiple disabled></select>
          </label>

          <fieldset class="radio-group">
            <legend>Capitalization</legend>
            <label class="radio-option">
              <input type="radio" name="capitalization" value="uppercase" checked>
              Uppercase
            </label>
            <label class="radio-option">
              <input type="radio" name="capitalization" value="lowercase">
              Lowercase
            </label>
            <label class="radio-option">
              <input type="radio" name="capitalization" value="original">
              As written
            </label>
          </fieldset>

          <div class="settings-actions">
            <button id="applySettingsButton" class="settings-action primary" type="submit" disabled>Apply</button>
            <button id="cancelSettingsButton" class="settings-action" type="button">Cancel</button>
          </div>
          <div id="settingsStatus" class="settings-status" aria-live="polite"></div>
        </form>
      </aside>
    </main>

    <script>
      const MIN_WORDS = 2;
      const MAX_WORDS = 4;
      const RESULT_DELAY_MS = 1200;
      const TIMEOUT_DELAY_MS = 260;
      const FIREWORK_SERIES_GAP_MS = 120;
      const SETTINGS_PASSWORD = "password";
      const DB_NAME = "shootingWordsReadingDb";
      const DB_VERSION = 1;
      const WORD_STORE = "words";
      const SETTINGS_STORAGE_KEY = "shootingWordsSettings";
      const CAPITALIZATION_MODES = new Set(["uppercase", "lowercase", "original"]);
      const EXPECTED_HEADERS = ["section", "lesson", "lesson_description", "word", "is_sight_word", "phonetic_symbol"];
      const ALLOWED_PHONETIC_SYMBOLS = new Set([
        "/ă/", "/ĕ/", "/ĭ/", "/ŏ/", "/ŭ/", "/ā/", "/ē/", "/ī/", "/ō/", "/ū/", "/o-o/", "/o˘o/",
        "/ô/", "/ou/", "/oi/", "/är/", "/ôr/", "/âr/", "/ûr/", "/ə/", "/b/", "/d/", "/f/",
        "/g/", "/h/", "/j/", "/k/", "/l/", "/m/", "/n/", "/p/", "/kw/", "/r/", "/s/", "/t/",
        "/v/", "/w/", "/ks/", "/y/", "/z/", "/sh/", "/th/", "/zh/", "/ch/", "/ng/", "/hw/"
      ]);
      const FIREWORK_PALETTES = [
        ["#ffef6e", "#ff7a59", "#ff477e", "#68e1fd", "#7cff8e"],
        ["#fff4a3", "#ffd166", "#fca311", "#ff6b35", "#ffffff"],
        ["#70d6ff", "#00b4d8", "#90e0ef", "#b8f7ff", "#bdb2ff"],
        ["#39ff14", "#f72585", "#7209b7", "#4cc9f0", "#fff200"],
        ["#ffd6e0", "#caffbf", "#9bf6ff", "#bdb2ff", "#fdffb6"]
      ];

      const state = {
        words: [],
        db: null,
        dbRows: [],
        currentFilters: {
          sections: [],
          lessons: []
        },
        capitalization: "uppercase",
        settingsAuthenticated: false,
        activeWords: [],
        target: null,
        running: false,
        locked: true,
        roundOver: false,
        waitingForWordsToLeave: false,
        correctStreak: 0,
        roundId: 0,
        animationId: 0,
        pointer: {
          x: window.innerWidth / 2,
          y: window.innerHeight * 0.28
        },
        nextRoundTimer: 0,
        fireworkTimers: []
      };

      const arenaEl = document.getElementById("arena");
      const wordLayerEl = document.getElementById("wordLayer");
      const laserLayerEl = document.getElementById("laserLayer");
      const fireworksCanvasEl = document.getElementById("fireworksCanvas");
      const fireworksCtx = fireworksCanvasEl.getContext("2d");
      const startScreenEl = document.getElementById("startScreen");
      const startButtonEl = document.getElementById("startButton");
      const soundButtonEl = document.getElementById("soundButton");
      const errorEl = document.getElementById("error");
      const barrelEl = document.getElementById("barrel");
      const gunPivotEl = document.getElementById("gunPivot");
      const settingsToggleEl = document.getElementById("settingsToggle");
      const settingsPanelEl = document.getElementById("settingsPanel");
      const passwordFormEl = document.getElementById("passwordForm");
      const settingsPasswordEl = document.getElementById("settingsPassword");
      const passwordStatusEl = document.getElementById("passwordStatus");
      const settingsFormEl = document.getElementById("settingsForm");
      const importButtonEl = document.getElementById("importButton");
      const clearDatabaseButtonEl = document.getElementById("clearDatabaseButton");
      const importFileInputEl = document.getElementById("importFileInput");
      const confirmClearEl = document.getElementById("confirmClear");
      const confirmClearYesEl = document.getElementById("confirmClearYes");
      const confirmClearCancelEl = document.getElementById("confirmClearCancel");
      const sectionSelectEl = document.getElementById("sectionSelect");
      const lessonSelectEl = document.getElementById("lessonSelect");
      const applySettingsButtonEl = document.getElementById("applySettingsButton");
      const cancelSettingsButtonEl = document.getElementById("cancelSettingsButton");
      const settingsStatusEl = document.getElementById("settingsStatus");
      const capitalizationEls = [...document.querySelectorAll("input[name='capitalization']")];
      const fireworkBursts = [];
      let fireworkWidth = 0;
      let fireworkHeight = 0;
      let lastFireworkFrame = performance.now();

      resizeFireworksCanvas();
      requestAnimationFrame(drawFireworks);
      init();

      async function init() {
        try {
          state.db = await openDatabase();
          state.dbRows = await readAllRows();
          loadSavedSettings();
          applyCurrentFilters();
          rebuildSettingsControls();
          updateAim();

          if (state.dbRows.length === 0) {
            startButtonEl.disabled = true;
            openSettingsPanel();
            showPasswordForm();
            setPasswordStatus("Import teaching-reading-words.csv to choose words for the game.");
          }
        } catch (error) {
          showError(`${error.message} IndexedDB needs a normal browser page context; run this page from the local web server.`);
        }
      }

      startButtonEl.addEventListener("click", () => {
        if (state.words.length < MIN_WORDS) {
          openSettingsPanel();
          showPasswordForm();
          setPasswordStatus("Import data and apply a word set before starting.");
          return;
        }

        state.running = true;
        startScreenEl.hidden = true;
        soundButtonEl.hidden = false;
        unlockSpeech();
        startRound();
      });

      soundButtonEl.addEventListener("click", (event) => {
        event.stopPropagation();
        if (state.target) {
          speakWord(state.target.word);
        }
      });

      arenaEl.addEventListener("pointermove", (event) => {
        state.pointer.x = event.clientX;
        state.pointer.y = event.clientY;
        updateAim();
      });

      arenaEl.addEventListener("pointerdown", (event) => {
        if (
          !state.running ||
          state.locked ||
          event.target.closest("button") ||
          event.target.closest(".settings-panel") ||
          event.target.closest(".settings-toggle")
        ) {
          return;
        }

        state.pointer.x = event.clientX;
        state.pointer.y = event.clientY;
        updateAim();
        shootLaser(event.clientX, event.clientY);

        const hit = findHitWord(event.clientX, event.clientY);
        if (!hit) {
          return;
        }

        if (hit.word === state.target.word) {
          finishRound("correct", hit);
        } else {
          handleWrongGuess();
        }
      });

      settingsToggleEl.addEventListener("click", () => {
        if (settingsPanelEl.classList.contains("open")) {
          closeSettingsPanel();
          return;
        }

        openSettingsPanel();
        if (state.settingsAuthenticated) {
          showSettingsForm();
        } else {
          showPasswordForm();
        }
      });

      passwordFormEl.addEventListener("submit", (event) => {
        event.preventDefault();
        if (settingsPasswordEl.value === SETTINGS_PASSWORD) {
          state.settingsAuthenticated = true;
          settingsPasswordEl.value = "";
          showSettingsForm();
          return;
        }

        setPasswordStatus("Incorrect password.", true);
        settingsPasswordEl.select();
      });

      importButtonEl.addEventListener("click", () => {
        importFileInputEl.value = "";
        importFileInputEl.click();
      });

      importFileInputEl.addEventListener("change", async () => {
        const [file] = importFileInputEl.files;
        if (!file) {
          return;
        }

        try {
          const text = await file.text();
          const rows = validateTeachingCsv(text);
          await replaceRows(rows);
          state.dbRows = rows;
          state.words = [];
          state.currentFilters = {
            sections: [],
            lessons: []
          };
          saveSettings();
          resetGameAfterDataChange();
          rebuildSettingsControls({ selectAll: true });
          setSettingsStatus(`Imported ${rows.length} rows. Choose sections and lessons, then Apply.`);
        } catch (error) {
          setSettingsStatus(error.message, true);
        }
      });

      clearDatabaseButtonEl.addEventListener("click", () => {
        confirmClearEl.hidden = false;
      });

      confirmClearCancelEl.addEventListener("click", () => {
        confirmClearEl.hidden = true;
      });

      confirmClearYesEl.addEventListener("click", async () => {
        try {
          await clearRows();
          state.dbRows = [];
          state.words = [];
          state.currentFilters = {
            sections: [],
            lessons: []
          };
          saveSettings();
          resetGameAfterDataChange();
          rebuildSettingsControls();
          confirmClearEl.hidden = true;
          setSettingsStatus("Database cleared. Import data to play.");
        } catch (error) {
          setSettingsStatus(error.message, true);
        }
      });

      sectionSelectEl.addEventListener("change", () => {
        rebuildLessonOptions(getSelectedValues(sectionSelectEl), getSelectedValues(lessonSelectEl));
      });

      settingsFormEl.addEventListener("submit", (event) => {
        event.preventDefault();
        applySelectedSettings();
      });

      cancelSettingsButtonEl.addEventListener("click", () => {
        rebuildSettingsControls();
        closeSettingsPanel();
      });

      window.addEventListener("resize", () => {
        updateAim();
        resizeFireworksCanvas();
      });

      function openSettingsPanel() {
        settingsPanelEl.classList.add("open");
        settingsPanelEl.setAttribute("aria-hidden", "false");
      }

      function closeSettingsPanel() {
        settingsPanelEl.classList.remove("open");
        settingsPanelEl.setAttribute("aria-hidden", "true");
        confirmClearEl.hidden = true;
      }

      function showPasswordForm() {
        passwordFormEl.hidden = false;
        settingsFormEl.hidden = true;
        window.setTimeout(() => settingsPasswordEl.focus(), 80);
      }

      function showSettingsForm() {
        passwordFormEl.hidden = true;
        settingsFormEl.hidden = false;
        rebuildSettingsControls();
        setSettingsStatus(state.dbRows.length ? `${state.dbRows.length} rows loaded.` : "No data loaded.");
      }

      function setPasswordStatus(message, isError = false) {
        passwordStatusEl.textContent = message;
        passwordStatusEl.classList.toggle("error-text", isError);
      }

      function setSettingsStatus(message, isError = false) {
        settingsStatusEl.textContent = message;
        settingsStatusEl.classList.toggle("error-text", isError);
      }

      function openDatabase() {
        if (!("indexedDB" in window)) {
          return Promise.reject(new Error("This browser does not support IndexedDB."));
        }

        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);

          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(WORD_STORE)) {
              db.createObjectStore(WORD_STORE, { keyPath: "id", autoIncrement: true });
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error("Could not open IndexedDB."));
        });
      }

      function readAllRows() {
        return new Promise((resolve, reject) => {
          const transaction = state.db.transaction(WORD_STORE, "readonly");
          const store = transaction.objectStore(WORD_STORE);
          const request = store.getAll();

          request.onsuccess = () => resolve(request.result || []);
          request.onerror = () => reject(request.error || new Error("Could not read IndexedDB rows."));
        });
      }

      function replaceRows(rows) {
        return new Promise((resolve, reject) => {
          const transaction = state.db.transaction(WORD_STORE, "readwrite");
          const store = transaction.objectStore(WORD_STORE);

          store.clear();
          rows.forEach((row) => store.add(row));

          transaction.oncomplete = () => resolve();
          transaction.onerror = () => reject(transaction.error || new Error("Could not import rows."));
        });
      }

      function clearRows() {
        return new Promise((resolve, reject) => {
          const transaction = state.db.transaction(WORD_STORE, "readwrite");
          transaction.objectStore(WORD_STORE).clear();
          transaction.oncomplete = () => resolve();
          transaction.onerror = () => reject(transaction.error || new Error("Could not clear IndexedDB."));
        });
      }

      function validateTeachingCsv(text) {
        const rows = parseCsv(text);
        if (rows.length < 2) {
          throw new Error("The CSV must include a header and at least one data row.");
        }

        const headers = rows[0].map((header) => header.trim());
        if (headers.length !== EXPECTED_HEADERS.length || headers.some((header, index) => header !== EXPECTED_HEADERS[index])) {
          throw new Error(`Invalid header. Expected: ${EXPECTED_HEADERS.join(",")}`);
        }

        return rows.slice(1).map((row, index) => {
          if (row.length !== EXPECTED_HEADERS.length) {
            throw new Error(`Row ${index + 2} has ${row.length} columns; expected ${EXPECTED_HEADERS.length}.`);
          }

          const [sectionText, lessonText, lessonDescription, word, isSightWord, phoneticSymbol] = row.map((value) => value.trim());
          const section = Number(sectionText);
          const lesson = Number(lessonText);

          if (!Number.isInteger(section) || section < 1) {
            throw new Error(`Row ${index + 2} has an invalid section.`);
          }

          if (!Number.isInteger(lesson) || lesson < 1) {
            throw new Error(`Row ${index + 2} has an invalid lesson.`);
          }

          if (!lessonDescription) {
            throw new Error(`Row ${index + 2} is missing lesson_description.`);
          }

          if (!word) {
            throw new Error(`Row ${index + 2} is missing word.`);
          }

          if (isSightWord !== "T" && isSightWord !== "F") {
            throw new Error(`Row ${index + 2} has invalid is_sight_word; use T or F.`);
          }

          if (!ALLOWED_PHONETIC_SYMBOLS.has(phoneticSymbol)) {
            throw new Error(`Row ${index + 2} has an unknown phonetic_symbol.`);
          }

          return {
            section,
            lesson,
            lesson_description: lessonDescription,
            word,
            is_sight_word: isSightWord,
            phonetic_symbol: phoneticSymbol
          };
        });
      }

      function loadSavedSettings() {
        try {
          const saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || "null");
          if (!saved) {
            return;
          }

          state.currentFilters = {
            sections: Array.isArray(saved.sections) ? saved.sections.map(String) : [],
            lessons: Array.isArray(saved.lessons) ? saved.lessons.map(String) : []
          };
          if (CAPITALIZATION_MODES.has(saved.capitalization)) {
            state.capitalization = saved.capitalization;
          }
        } catch {
          state.currentFilters = {
            sections: [],
            lessons: []
          };
          state.capitalization = "uppercase";
        }
      }

      function saveSettings() {
        localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify({
          sections: state.currentFilters.sections,
          lessons: state.currentFilters.lessons,
          capitalization: state.capitalization
        }));
      }

      function rebuildSettingsControls(options = {}) {
        const hasData = state.dbRows.length > 0;
        const sections = uniqueSections();
        const selectedSections = options.selectAll || state.currentFilters.sections.length === 0
          ? sections
          : state.currentFilters.sections.filter((section) => sections.includes(section));

        sectionSelectEl.innerHTML = "";
        sections.forEach((section) => {
          const option = document.createElement("option");
          option.value = section;
          option.textContent = section;
          option.selected = selectedSections.includes(section);
          sectionSelectEl.appendChild(option);
        });

        rebuildLessonOptions(selectedSections, options.selectAll ? [] : state.currentFilters.lessons);
        setCapitalizationSelection(state.capitalization);

        sectionSelectEl.disabled = !hasData;
        lessonSelectEl.disabled = !hasData;
        applySettingsButtonEl.disabled = !hasData;
        clearDatabaseButtonEl.disabled = !hasData;
      }

      function rebuildLessonOptions(selectedSections, selectedLessons) {
        const sectionSet = new Set(selectedSections.map(String));
        const rows = state.dbRows.filter((row) => sectionSet.size === 0 || sectionSet.has(String(row.section)));
        const lessons = uniqueLessons(rows);
        const selectedSet = new Set(selectedLessons.map(String).filter((lesson) => lessons.some((item) => item.value === lesson)));
        const shouldSelectAll = selectedSet.size === 0;

        lessonSelectEl.innerHTML = "";
        lessons.forEach((lesson) => {
          const option = document.createElement("option");
          option.value = lesson.value;
          option.textContent = lesson.label;
          option.selected = shouldSelectAll || selectedSet.has(lesson.value);
          lessonSelectEl.appendChild(option);
        });
      }

      function applySelectedSettings() {
        if (state.dbRows.length === 0) {
          setSettingsStatus("Import data before applying settings.", true);
          return;
        }

        const sections = getSelectedValues(sectionSelectEl);
        const lessons = getSelectedValues(lessonSelectEl);
        if (sections.length === 0 || lessons.length === 0) {
          setSettingsStatus("Choose at least one section and one lesson.", true);
          return;
        }

        const selectedRows = filterRows(sections, lessons);
        const selectedWords = uniqueWords(selectedRows);
        const capitalization = getSelectedCapitalization();
        if (selectedWords.length < MIN_WORDS) {
          setSettingsStatus("The selected data must contain at least two unique words.", true);
          return;
        }

        state.currentFilters = { sections, lessons };
        state.capitalization = capitalization;
        state.words = selectedWords;
        saveSettings();
        startButtonEl.disabled = false;
        setSettingsStatus(`${selectedWords.length} words selected.`);
        closeSettingsPanel();
      }

      function applyCurrentFilters() {
        if (state.dbRows.length === 0) {
          state.words = [];
          startButtonEl.disabled = true;
          return;
        }

        const sections = normalizeStoredValues(state.currentFilters.sections, uniqueSections());
        const lessons = normalizeStoredValues(state.currentFilters.lessons, uniqueLessons(state.dbRows).map((lesson) => lesson.value));
        let selectedRows = filterRows(sections, lessons);
        let selectedWords = uniqueWords(selectedRows);

        if (selectedWords.length < MIN_WORDS) {
          state.currentFilters = { sections: [], lessons: [] };
          selectedRows = state.dbRows;
          selectedWords = uniqueWords(selectedRows);
        }

        state.words = selectedWords;
        startButtonEl.disabled = selectedWords.length < MIN_WORDS;
      }

      function filterRows(sections, lessons) {
        const sectionSet = new Set(sections.map(String));
        const lessonSet = new Set(lessons.map(String));
        return state.dbRows.filter((row) => {
          return sectionSet.has(String(row.section)) && lessonSet.has(String(row.lesson));
        });
      }

      function uniqueSections() {
        return [...new Set(state.dbRows.map((row) => String(row.section)))]
          .sort((a, b) => Number(a) - Number(b));
      }

      function uniqueLessons(rows) {
        const lessons = new Map();
        rows.forEach((row) => {
          const key = String(row.lesson);
          if (!lessons.has(key)) {
            lessons.set(key, {
              value: key,
              label: `#${row.lesson} - ${row.lesson_description}`
            });
          }
        });

        return [...lessons.values()].sort((a, b) => Number(a.value) - Number(b.value));
      }

      function uniqueWords(rows) {
        return [...new Set(rows.map((row) => row.word.trim()).filter(Boolean))];
      }

      function normalizeStoredValues(values, allowedValues) {
        const allowedSet = new Set(allowedValues.map(String));
        return values.map(String).filter((value) => allowedSet.has(value));
      }

      function getSelectedValues(select) {
        return [...select.selectedOptions].map((option) => option.value);
      }

      function getSelectedCapitalization() {
        return capitalizationEls.find((input) => input.checked)?.value || "uppercase";
      }

      function setCapitalizationSelection(mode) {
        const selectedMode = CAPITALIZATION_MODES.has(mode) ? mode : "uppercase";
        capitalizationEls.forEach((input) => {
          input.checked = input.value === selectedMode;
        });
      }

      function formatDisplayWord(word) {
        if (state.capitalization === "lowercase") {
          return word.toLocaleLowerCase();
        }

        if (state.capitalization === "original") {
          return word;
        }

        return word.toLocaleUpperCase();
      }

      function resetGameAfterDataChange() {
        clearTimeout(state.nextRoundTimer);
        window.cancelAnimationFrame(state.animationId);
        window.speechSynthesis?.cancel();
        state.running = false;
        state.locked = true;
        state.roundOver = true;
        state.waitingForWordsToLeave = false;
        state.activeWords = [];
        state.target = null;
        wordLayerEl.innerHTML = "";
        laserLayerEl.innerHTML = "";
        clearFireworks();
        startScreenEl.hidden = false;
        soundButtonEl.hidden = true;
        startButtonEl.disabled = state.words.length < MIN_WORDS;
      }

      function startRound() {
        clearTimeout(state.nextRoundTimer);
        window.cancelAnimationFrame(state.animationId);

        state.roundId += 1;
        state.locked = false;
        state.roundOver = false;
        state.waitingForWordsToLeave = false;
        state.activeWords = [];
        wordLayerEl.innerHTML = "";
        laserLayerEl.innerHTML = "";
        clearFireworks();

        const roundWords = pickRoundWords();
        state.target = roundWords[randomInt(0, roundWords.length - 1)];
        const now = performance.now();

        roundWords.forEach((entry, index) => {
          const token = createWordToken(entry.word, index, roundWords.length, now);
          state.activeWords.push(token);
          placeWord(token, 0);
          wordLayerEl.appendChild(token.el);
        });

        state.animationId = window.requestAnimationFrame(animateWords);
        speakWord(state.target.word);
      }

      function pickRoundWords() {
        const count = randomInt(MIN_WORDS, Math.min(MAX_WORDS, state.words.length));
        return shuffle(state.words)
          .slice(0, count)
          .map((word) => ({ word }));
      }

      function createWordToken(word, index, total, now) {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const margin = Math.max(82, width * 0.08);
        const usableWidth = Math.max(1, width - margin * 2);
        const laneWidth = usableWidth / total;
        const bottomY = height + randomInt(58, 108);
        const apexY = randomInt(72, Math.max(96, Math.min(178, Math.floor(height * 0.27))));
        const laneCenter = margin + laneWidth * index + laneWidth / 2;
        const startX = clamp(laneCenter + randomInt(-Math.floor(laneWidth * 0.22), Math.floor(laneWidth * 0.22)), margin, width - margin);
        const apexX = randomInt(margin, Math.max(margin + 1, width - margin));
        const endX = clamp(startX + randomInt(-Math.floor(width * 0.34), Math.floor(width * 0.34)), margin, width - margin);
        const duration = randomInt(5600, 7300);
        const delay = index * randomInt(80, 180);
        const el = document.createElement("div");

        el.className = "word-token";
        el.textContent = formatDisplayWord(word);
        el.dataset.word = word;
        el.setAttribute("role", "button");
        el.setAttribute("aria-label", word);

        return {
          word,
          el,
          startTime: now + delay,
          duration,
          bottomY,
          apexY,
          startX,
          apexX,
          endX,
          done: false,
          exploding: false
        };
      }

      function animateWords(now) {
        if (state.roundOver) {
          return;
        }

        let remaining = 0;

        state.activeWords.forEach((token) => {
          if (token.done || token.exploding) {
            return;
          }

          const rawProgress = (now - token.startTime) / token.duration;
          if (rawProgress < 0) {
            remaining += 1;
            placeWord(token, 0);
            return;
          }

          if (rawProgress >= 1) {
            token.done = true;
            token.el.remove();
            return;
          }

          remaining += 1;
          placeWord(token, rawProgress);
        });

        if (remaining > 0) {
          state.animationId = window.requestAnimationFrame(animateWords);
        } else {
          finishRound(state.waitingForWordsToLeave ? "wrong-timeout" : "timeout");
        }
      }

      function placeWord(token, progress) {
        const t = clamp(progress, 0, 1);
        const oneMinusT = 1 - t;
        const x = oneMinusT * oneMinusT * token.startX + 2 * oneMinusT * t * token.apexX + t * t * token.endX;
        const y = token.apexY + (token.bottomY - token.apexY) * Math.pow(2 * t - 1, 2);

        token.el.style.left = `${x}px`;
        token.el.style.top = `${y}px`;
      }

      function finishRound(result, hit) {
        if (state.roundOver) {
          return;
        }

        state.roundOver = true;
        state.locked = true;
        window.cancelAnimationFrame(state.animationId);
        window.speechSynthesis?.cancel();

        let delay = TIMEOUT_DELAY_MS;

        if (result === "correct") {
          state.correctStreak += 1;
          explodeWord(hit, state.correctStreak);
          delay = correctRoundDelay(state.correctStreak);
        } else {
          state.correctStreak = 0;
        }

        state.nextRoundTimer = window.setTimeout(startRound, delay);
      }

      function handleWrongGuess() {
        state.locked = true;
        state.waitingForWordsToLeave = true;
        state.correctStreak = 0;
        window.speechSynthesis?.cancel();

        state.activeWords.forEach((token) => {
          if (!token.done && !token.exploding) {
            token.el.classList.add("flash");
          }
        });
      }

      function correctRoundDelay(streak) {
        return Math.min(3400, RESULT_DELAY_MS + streak * FIREWORK_SERIES_GAP_MS);
      }

      function explodeWord(token, fireworkCount) {
        token.exploding = true;
        token.done = true;

        const rect = token.el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        token.el.remove();
        spawnFireworkSeries(centerX, centerY, fireworkCount);
      }

      function resizeFireworksCanvas() {
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        const rect = arenaEl.getBoundingClientRect();

        fireworkWidth = rect.width || window.innerWidth;
        fireworkHeight = rect.height || window.innerHeight;
        fireworksCanvasEl.width = Math.floor(fireworkWidth * ratio);
        fireworksCanvasEl.height = Math.floor(fireworkHeight * ratio);
        fireworksCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
        fireworksCtx.clearRect(0, 0, fireworkWidth, fireworkHeight);
      }

      function clearFireworks() {
        state.fireworkTimers.forEach((timer) => clearTimeout(timer));
        state.fireworkTimers = [];
        fireworkBursts.length = 0;
        fireworksCtx.globalCompositeOperation = "source-over";
        fireworksCtx.globalAlpha = 1;
        fireworksCtx.clearRect(0, 0, fireworkWidth, fireworkHeight);
      }

      function spawnFireworkSeries(centerX, centerY, count) {
        const palette = FIREWORK_PALETTES[randomInt(0, FIREWORK_PALETTES.length - 1)];
        const spread = Math.min(180, 44 + count * 10);

        for (let index = 0; index < count; index += 1) {
          const timer = window.setTimeout(() => {
            const angle = count === 1 ? 0 : (Math.PI * 2 * index) / count + randomBetween(-0.28, 0.28);
            const distance = count === 1 ? 0 : randomBetween(24, spread);
            const x = clamp(centerX + Math.cos(angle) * distance, 36, fireworkWidth - 36);
            const y = clamp(centerY + Math.sin(angle) * distance, 52, fireworkHeight - 120);

            spawnFireworkBurst(x, y, palette);
          }, index * FIREWORK_SERIES_GAP_MS);

          state.fireworkTimers.push(timer);
        }
      }

      function spawnFireworkBurst(centerX, centerY, colors) {
        const particleCount = Math.floor(randomBetween(52, 86));
        const particles = [];

        for (let index = 0; index < particleCount; index += 1) {
          const angle = (Math.PI * 2 * index) / particleCount + randomBetween(-0.1, 0.1);
          const speed = randomBetween(1.4, 5.2);

          particles.push({
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            drag: randomBetween(0.982, 0.991),
            gravity: randomBetween(0.024, 0.044),
            size: randomBetween(1.2, 2.8),
            life: 0,
            maxLife: randomBetween(70, 112),
            color: colors[randomInt(0, colors.length - 1)]
          });
        }

        fireworkBursts.push({ particles });
      }

      function drawFireworks(now) {
        const delta = Math.min((now - lastFireworkFrame) / 16.67, 2);
        lastFireworkFrame = now;

        fireworksCtx.globalCompositeOperation = "source-over";
        fireworksCtx.globalAlpha = 1;
        fireworksCtx.clearRect(0, 0, fireworkWidth, fireworkHeight);
        fireworksCtx.globalCompositeOperation = "lighter";

        for (let index = fireworkBursts.length - 1; index >= 0; index -= 1) {
          const burst = fireworkBursts[index];
          let aliveParticles = 0;

          for (const particle of burst.particles) {
            if (particle.life >= particle.maxLife) {
              continue;
            }

            particle.life += delta;
            particle.vx *= particle.drag;
            particle.vy = particle.vy * particle.drag + particle.gravity * delta;
            particle.x += particle.vx * delta;
            particle.y += particle.vy * delta;

            const fade = Math.max(0, 1 - particle.life / particle.maxLife);
            fireworksCtx.globalAlpha = fade;
            fireworksCtx.fillStyle = particle.color;
            fireworksCtx.beginPath();
            fireworksCtx.arc(particle.x, particle.y, particle.size * fade + 0.35, 0, Math.PI * 2);
            fireworksCtx.fill();

            aliveParticles += 1;
          }

          if (aliveParticles === 0) {
            fireworkBursts.splice(index, 1);
          }
        }

        window.requestAnimationFrame(drawFireworks);
      }

      function findHitWord(x, y) {
        const tolerance = 12;

        return state.activeWords.find((token) => {
          if (token.done || token.exploding) {
            return false;
          }

          const rect = token.el.getBoundingClientRect();
          return (
            x >= rect.left - tolerance &&
            x <= rect.right + tolerance &&
            y >= rect.top - tolerance &&
            y <= rect.bottom + tolerance
          );
        });
      }

      function shootLaser(x, y) {
        const { x: tipX, y: tipY } = getGunTip();
        const angle = Math.atan2(y - tipY, x - tipX);
        const distance = Math.hypot(x - tipX, y - tipY);
        const shot = document.createElement("div");
        const spark = document.createElement("div");
        const transform = `translate(${tipX}px, ${tipY}px) rotate(${angle}rad)`;

        shot.className = "laser-shot";
        shot.style.width = `${distance}px`;
        shot.style.transform = transform;
        shot.style.setProperty("--laser-transform", transform);
        laserLayerEl.appendChild(shot);

        spark.className = "spark";
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        laserLayerEl.appendChild(spark);

        window.setTimeout(() => {
          shot.remove();
          spark.remove();
        }, 280);
      }

      function updateAim() {
        const pivot = getGunPivot();
        const angle = Math.atan2(state.pointer.y - pivot.y, state.pointer.x - pivot.x);
        barrelEl.style.transform = `translateX(-50%) rotate(${angle + Math.PI / 2}rad)`;
      }

      function getGunPivot() {
        const rect = gunPivotEl.getBoundingClientRect();
        return {
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2
        };
      }

      function getGunTip() {
        const pivot = getGunPivot();
        const angle = Math.atan2(state.pointer.y - pivot.y, state.pointer.x - pivot.x);
        const length = barrelEl.offsetHeight - 2;

        return {
          x: pivot.x + Math.cos(angle) * length,
          y: pivot.y + Math.sin(angle) * length
        };
      }

      function speakWord(word) {
        if (!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) {
          return;
        }

        const utterance = new SpeechSynthesisUtterance(word);
        const voice = getEnglishVoice();

        utterance.lang = "en-US";
        utterance.rate = 0.78;
        utterance.pitch = 1.08;
        if (voice) {
          utterance.voice = voice;
        }

        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      function unlockSpeech() {
        if (!("speechSynthesis" in window)) {
          return;
        }

        window.speechSynthesis.resume();
        window.speechSynthesis.getVoices();
      }

      function getEnglishVoice() {
        if (!("speechSynthesis" in window)) {
          return null;
        }

        const voices = window.speechSynthesis.getVoices();
        return (
          voices.find((voice) => voice.lang === "en-US" && /female|samantha|zira|google/i.test(voice.name)) ||
          voices.find((voice) => voice.lang === "en-US") ||
          voices.find((voice) => voice.lang.startsWith("en")) ||
          null
        );
      }

      function showError(message) {
        errorEl.hidden = false;
        errorEl.textContent = message;
        startButtonEl.disabled = true;
      }

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let field = "";
        let inQuotes = false;

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];

          if (char === '"' && inQuotes && next === '"') {
            field += '"';
            index += 1;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === "," && !inQuotes) {
            row.push(field);
            field = "";
          } else if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") {
              index += 1;
            }

            row.push(field);
            if (row.some((value) => value.trim() !== "")) {
              rows.push(row);
            }
            row = [];
            field = "";
          } else {
            field += char;
          }
        }

        row.push(field);
        if (row.some((value) => value.trim() !== "")) {
          rows.push(row);
        }

        return rows;
      }

      function shuffle(items) {
        const copy = [...items];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = randomInt(0, index);
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }
        return copy;
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function randomBetween(min, max) {
        return Math.random() * (max - min) + min;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }
    </script>
