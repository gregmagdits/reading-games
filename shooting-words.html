<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shooting Words</title>
    <style>
      :root {
        color-scheme: light;
        --sky-top: #07162f;
        --sky-mid: #112c55;
        --grass: #1f5a3c;
        --grass-dark: #123522;
        --ink: #17202a;
        --panel: #ffffff;
        --laser: #ff294c;
        --laser-glow: rgba(255, 41, 76, 0.45);
        --barrel: #42515f;
        --barrel-dark: #202a33;
        --cannon: #515c68;
        --cannon-dark: #252d36;
        --cannon-wheel: #6f4628;
        --rocket-red: #ef476f;
        --rocket-blue: #70d6ff;
        --bow-wood: #9b5a32;
        --bow-dark: #5b341f;
        --cowboy-hat: #8a5a35;
        --cowboy-shirt: #d62828;
        --cowboy-denim: #2f5d8c;
        --skin: #f1c27d;
        --orange: #f18f01;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        background: var(--sky-top);
      }

      button {
        font: inherit;
      }

      .arena {
        position: relative;
        width: 100vw;
        height: 100vh;
        min-height: 460px;
        overflow: hidden;
        background:
          radial-gradient(circle at 14% 15%, rgba(255, 255, 230, 0.95) 0 36px, rgba(255, 255, 230, 0) 37px),
          radial-gradient(circle at 28% 18%, rgba(255, 255, 255, 0.9) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 46% 10%, rgba(255, 255, 255, 0.8) 0 1px, rgba(255, 255, 255, 0) 2px),
          radial-gradient(circle at 62% 22%, rgba(255, 255, 255, 0.82) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 81% 13%, rgba(255, 255, 255, 0.78) 0 1px, rgba(255, 255, 255, 0) 2px),
          radial-gradient(circle at 91% 30%, rgba(255, 255, 255, 0.72) 0 2px, rgba(255, 255, 255, 0) 3px),
          linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 60%, #163c3e 82%, var(--grass) 82%, var(--grass-dark) 100%);
        cursor: crosshair;
      }

      .arena.laser-scene {
        background:
          radial-gradient(circle at 14% 15%, rgba(255, 255, 230, 0.95) 0 36px, rgba(255, 255, 230, 0) 37px),
          radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.9) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 48% 10%, rgba(255, 255, 255, 0.82) 0 1px, rgba(255, 255, 255, 0) 2px),
          radial-gradient(circle at 78% 16%, rgba(255, 255, 255, 0.82) 0 2px, rgba(255, 255, 255, 0) 3px),
          linear-gradient(180deg, #07162f 0%, #132d58 62%, #18364e 82%, #123522 100%);
      }

      .arena.dragon-scene {
        background:
          radial-gradient(circle at 16% 14%, rgba(255, 240, 178, 0.92) 0 34px, rgba(255, 240, 178, 0) 35px),
          radial-gradient(circle at 42% 16%, rgba(255, 255, 255, 0.78) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 72% 11%, rgba(255, 255, 255, 0.8) 0 1px, rgba(255, 255, 255, 0) 2px),
          linear-gradient(180deg, #07162f 0%, #172e4e 60%, #254b4a 82%, #1f5a3c 100%);
      }

      .arena.cannon-scene {
        background:
          radial-gradient(circle at 14% 15%, rgba(255, 244, 184, 0.86) 0 34px, rgba(255, 244, 184, 0) 35px),
          linear-gradient(180deg, #08213f 0%, #164b72 48%, #1f78a6 63%, #0f618d 64%, #07476e 100%);
      }

      .arena.rocket-scene {
        background:
          radial-gradient(circle at 18% 28%, rgba(255, 210, 128, 0.96) 0 72px, rgba(244, 136, 84, 0.92) 73px 104px, rgba(244, 136, 84, 0) 105px),
          radial-gradient(circle at 14% 21%, rgba(255, 248, 208, 0.72) 0 16px, rgba(255, 248, 208, 0) 17px),
          radial-gradient(circle at 33% 11%, rgba(255, 255, 255, 0.92) 0 2px, rgba(255, 255, 255, 0) 3px),
          radial-gradient(circle at 58% 18%, rgba(255, 255, 255, 0.86) 0 1px, rgba(255, 255, 255, 0) 2px),
          radial-gradient(circle at 82% 9%, rgba(255, 255, 255, 0.88) 0 2px, rgba(255, 255, 255, 0) 3px),
          linear-gradient(180deg, #030817 0%, #081b3d 58%, #102d4f 82%, #1d293a 100%);
      }

      .scene-visual {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background-repeat: no-repeat;
      }

      .scene-visual::before,
      .scene-visual::after {
        content: "";
        display: none;
        position: absolute;
        pointer-events: none;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
      }

      .word-layer,
      .laser-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .word-layer {
        z-index: 2;
      }

      .laser-layer {
        z-index: 7;
      }

      .fireworks-canvas {
        position: absolute;
        inset: 0;
        z-index: 5;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .word-token {
        position: absolute;
        min-width: clamp(110px, 18vw, 190px);
        padding: clamp(10px, 1.6vw, 16px) clamp(16px, 2.2vw, 26px);
        border: 4px solid #17202a;
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(23, 32, 42, 0.22);
        font-size: clamp(38px, 7vmin, 76px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        text-align: center;
        transform: translate(-50%, -50%);
        user-select: none;
        pointer-events: auto;
        will-change: transform, opacity;
      }

      .word-token.flash {
        animation: word-flash 1.15s ease-in-out infinite;
      }

      .sound-button {
        position: absolute;
        top: clamp(16px, 3vh, 28px);
        right: clamp(16px, 3vw, 28px);
        z-index: 8;
        width: 58px;
        height: 58px;
        display: grid;
        place-items: center;
        border: 3px solid #17202a;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(23, 32, 42, 0.18);
        cursor: pointer;
        font-size: 30px;
      }

      .sound-button[hidden] {
        display: none;
      }

        height: 18px;
        border: 3px solid #17202a;
        background: #d62828;
        transform: translateX(-50%);
      }

      .rocket-fin {
        position: absolute;
        bottom: 18%;
        width: 28px;
        height: 40px;
        border: 4px solid #17202a;
        background: var(--rocket-red);
      }

      .rocket-fin-left {
        left: 0;
        clip-path: polygon(100% 0, 100% 100%, 0 100%);
      }

      .rocket-fin-right {
        right: 0;
        clip-path: polygon(0 0, 100% 100%, 0 100%);
      }

      .rocket-flame {
        position: absolute;
        left: 50%;
        bottom: -8px;
        width: 24px;
        height: 42px;
        border-radius: 50% 50% 58% 58%;
        background: linear-gradient(180deg, #ffef6e, #ff7a1a 62%, rgba(255, 122, 26, 0));
        transform: translateX(-50%);
        filter: drop-shadow(0 0 10px rgba(255, 122, 26, 0.78));
      }

      .rocket-pivot {
        position: absolute;
        left: 50%;
        bottom: 50px;
        width: 1px;
        height: 1px;
      }

      .launch-pad {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: clamp(118px, 18vmin, 168px);
        height: 48px;
        border: 4px solid #17202a;
        border-radius: 8px 8px 0 0;
        background: linear-gradient(180deg, #6b7280, #374151);
        transform: translateX(-50%);
        z-index: 1;
      }

      .launch-pad::before,
      .launch-pad::after {
        content: "";
        position: absolute;
        bottom: 42px;
        width: 16px;
        height: 88px;
        border: 3px solid #17202a;
        background: repeating-linear-gradient(180deg, #a7b3c2 0 12px, #64748b 12px 24px);
      }

      .launch-pad::before {
        left: 18px;
      }

      .launch-pad::after {
        right: 18px;
      }

      .bow-weapon {
        position: absolute;
        left: 50%;
        bottom: 26px;
        width: clamp(88px, 13vmin, 122px);
        height: clamp(124px, 18vmin, 164px);
        transform: translateX(-50%) rotate(0rad);
        transform-origin: 50% calc(100% - 14px);
        z-index: 3;
      }

      .bow-arc {
        position: absolute;
        left: 50%;
        top: 0;
        width: 54%;
        height: 100%;
        border: 8px solid var(--bow-dark);
        border-left: 0;
        border-radius: 0 999px 999px 0;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0));
        transform: translateX(-10%);
      }

      .bow-string {
        position: absolute;
        left: 50%;
        top: 8px;
        width: 4px;
        height: calc(100% - 16px);
        border-radius: 999px;
        background: #f8edc8;
        transform: translateX(-50%);
        box-shadow: 0 0 0 2px rgba(23, 32, 42, 0.18);
      }

      .bow-ready-arrow {
        position: absolute;
        left: 50%;
        top: 5px;
        width: 6px;
        height: calc(100% - 28px);
        border: 2px solid #17202a;
        border-radius: 999px;
        background: linear-gradient(180deg, #e3b46e, #734a2b);
        transform: translateX(-50%);
      }

      .bow-ready-arrow::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -15px;
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-bottom: 18px solid #d6a23a;
        transform: translateX(-50%);
      }

      .bow-grip {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 24px;
        height: 38px;
        border: 4px solid #17202a;
        border-radius: 999px;
        background: linear-gradient(180deg, #c98442, var(--bow-wood));
        transform: translate(-50%, -50%);
      }

      .bow-pivot {
        position: absolute;
        left: 50%;
        bottom: 40px;
        width: 1px;
        height: 1px;
      }

      .cowboy-figure {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: clamp(128px, 19vmin, 174px);
        height: clamp(144px, 21vmin, 190px);
        transform: translateX(-50%);
        z-index: 3;
      }

      .cowboy-head {
        position: absolute;
        left: 50%;
        bottom: 88px;
        width: clamp(42px, 6.5vmin, 58px);
        height: clamp(42px, 6.5vmin, 58px);
        border: 4px solid #17202a;
        border-radius: 48% 48% 52% 52%;
        background: var(--skin);
        transform: translateX(-50%);
        z-index: 3;
      }

      .cowboy-head::before,
      .cowboy-head::after {
        content: "";
        position: absolute;
        top: 42%;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #17202a;
      }

      .cowboy-head::before {
        left: 28%;
      }

      .cowboy-head::after {
        right: 28%;
      }

      .cowboy-hat {
        position: absolute;
        left: 50%;
        bottom: 126px;
        width: clamp(78px, 11vmin, 106px);
        height: 22px;
        border: 4px solid #17202a;
        border-radius: 999px;
        background: var(--cowboy-hat);
        transform: translateX(-50%);
        z-index: 4;
      }

      .cowboy-hat::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 9px;
        width: 48%;
        height: 32px;
        border: 4px solid #17202a;
        border-bottom: 0;
        border-radius: 22px 22px 8px 8px;
        background: linear-gradient(180deg, #b77944, var(--cowboy-hat));
        transform: translateX(-50%);
      }

      .cowboy-body {
        position: absolute;
        left: 50%;
        bottom: 32px;
        width: clamp(68px, 10vmin, 92px);
        height: clamp(66px, 10vmin, 88px);
        border: 4px solid #17202a;
        border-radius: 24px 24px 12px 12px;
        background:
          linear-gradient(90deg, transparent 0 46%, #ffffff 47% 53%, transparent 54% 100%),
          linear-gradient(180deg, #ff595e, var(--cowboy-shirt));
        transform: translateX(-50%);
        z-index: 2;
      }

      .cowboy-body::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -20px;
        width: 112%;
        height: 22px;
        border: 4px solid #17202a;
        border-radius: 10px;
        background: linear-gradient(90deg, var(--cowboy-denim) 0 45%, #17202a 46% 54%, var(--cowboy-denim) 55% 100%);
        transform: translateX(-50%);
      }

      .cowboy-arm {
        position: absolute;
        left: calc(50% + 18px);
        bottom: 92px;
        width: clamp(112px, 16vmin, 148px);
        height: 30px;
        transform: translateY(-50%) rotate(0rad);
        transform-origin: 12px 50%;
        z-index: 5;
      }

      .cowboy-sleeve {
        position: absolute;
        left: 0;
        top: 7px;
        width: 52px;
        height: 17px;
        border: 3px solid #17202a;
        border-radius: 999px;
        background: var(--cowboy-shirt);
      }

      .cowboy-hand {
        position: absolute;
        left: 42px;
        top: 4px;
        width: 22px;
        height: 22px;
        border: 3px solid #17202a;
        border-radius: 50%;
        background: var(--skin);
        z-index: 2;
      }

      .six-shooter {
        position: absolute;
        left: 56px;
        top: 6px;
        width: 42px;
        height: 18px;
        border: 3px solid #17202a;
        border-radius: 12px 8px 8px 12px;
        background: linear-gradient(180deg, #c5ced8, #5b6470);
        z-index: 3;
      }

      .six-shooter::before {
        content: "";
        position: absolute;
        left: 32px;
        top: 4px;
        width: 36px;
        height: 8px;
        border: 3px solid #17202a;
        border-radius: 999px;
        background: linear-gradient(180deg, #dbe3ec, #65717d);
      }

      .six-shooter::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 10px;
        width: 15px;
        height: 24px;
        border: 3px solid #17202a;
        border-top: 0;
        border-radius: 4px 4px 999px 999px;
        background: linear-gradient(180deg, #8a5a35, #4f321d);
        transform: rotate(-18deg);
      }

      .cowboy-pivot {
        position: absolute;
        left: calc(50% + 30px);
        bottom: 92px;
        width: 1px;
        height: 1px;
      }

      .gun.cannon-mode .barrel {
        bottom: 44px;
        width: clamp(38px, 5.6vmin, 54px);
        height: clamp(86px, 12vmin, 112px);
        border-width: 4px;
        border-radius: 18px 18px 26px 26px;
        background: linear-gradient(90deg, #171b20, var(--cannon-dark) 26%, var(--cannon) 56%, #87919c);
        transform-origin: 50% calc(100% - 12px);
        box-shadow: inset 0 12px 18px rgba(255, 255, 255, 0.12), inset 0 -14px 16px rgba(0, 0, 0, 0.22);
        z-index: 3;
      }

      .gun.cannon-mode .barrel-tip {
        top: -10px;
        width: clamp(48px, 7vmin, 66px);
        height: clamp(22px, 3.2vmin, 30px);
        border-width: 4px;
        background:
          radial-gradient(ellipse at 50% 50%, #11161b 0 34%, #343c46 35% 62%, #9099a3 63% 100%);
      }

      .gun.cannon-mode .gun-pivot {
        bottom: 56px;
      }

      .gun.cannon-mode .gun-body {
        bottom: 20px;
        width: clamp(126px, 19vmin, 168px);
        height: clamp(48px, 7vmin, 62px);
        border-radius: 22px 22px 14px 14px;
        background: linear-gradient(180deg, #677382, #343e49);
        z-index: 2;
      }

      .gun.cannon-mode .gun-body::before,
      .gun.cannon-mode .gun-body::after {
        content: "";
        position: absolute;
        top: 28px;
        width: clamp(42px, 6vmin, 56px);
        height: clamp(42px, 6vmin, 56px);
        border: 4px solid #17202a;
        border-radius: 50%;
        background:
          radial-gradient(circle, #17202a 0 16%, #c98442 17% 28%, var(--cannon-wheel) 29% 100%);
      }

      .gun.cannon-mode .gun-body::before {
        left: -2px;
        transform: none;
      }

      .gun.cannon-mode .gun-body::after {
        right: -2px;
      }

      .gun.cannon-mode .stand {
        bottom: 10px;
        width: clamp(110px, 17vmin, 152px);
        height: 22px;
        border: 4px solid #17202a;
        border-radius: 12px;
        background: linear-gradient(180deg, #8a5a35, #4f321d);
        z-index: 1;
      }

      .dragon-head {
        position: absolute;
        left: 50%;
        bottom: 34px;
        width: clamp(126px, 19vmin, 178px);
        height: clamp(108px, 17vmin, 152px);
        border: 4px solid #17202a;
        border-radius: 48% 48% 55% 55%;
        background:
          radial-gradient(circle at 34% 42%, rgba(255, 255, 255, 0.32) 0 16%, rgba(255, 255, 255, 0) 17%),
          linear-gradient(135deg, #79d96f, #28a745 58%, #176f36);
        box-shadow: 0 12px 0 rgba(23, 32, 42, 0.12);
        transform: translateX(-50%) rotate(0rad);
        transform-origin: 50% 100%;
      }

      .dragon-crest {
        position: absolute;
        left: 50%;
        top: -22px;
        width: 56%;
        height: 34px;
        background: linear-gradient(180deg, #ff715b, #d7261e);
        clip-path: polygon(0 100%, 15% 20%, 30% 100%, 50% 0, 70% 100%, 85% 20%, 100% 100%);
        transform: translateX(-50%);
      }

      .dragon-horn {
        position: absolute;
        top: -14px;
        width: 22px;
        height: 34px;
        border: 3px solid #17202a;
        border-radius: 70% 70% 20% 20%;
        background: #fff1c2;
      }

      .dragon-horn-left {
        left: 24px;
        transform: rotate(-24deg);
      }

      .dragon-horn-right {
        right: 24px;
        transform: rotate(24deg);
      }

      .dragon-eye {
        position: absolute;
        top: 36%;
        width: 20px;
        height: 20px;
        border: 3px solid #17202a;
        border-radius: 50%;
        background: #ffffff;
      }

      .dragon-eye::after {
        content: "";
        position: absolute;
        left: 6px;
        top: 4px;
        width: 7px;
        height: 10px;
        border-radius: 50%;
        background: #17202a;
      }

      .dragon-eye-left {
        left: 28%;
      }

      .dragon-eye-right {
        right: 28%;
      }

      .dragon-snout {
        position: absolute;
        left: 50%;
        top: -6px;
        width: 54%;
        height: 42%;
        border: 3px solid #17202a;
        border-radius: 48% 48% 58% 58%;
        background: linear-gradient(180deg, #b8f48a, #63c95c);
        transform: translateX(-50%);
      }

      .dragon-nostril {
        position: absolute;
        top: 42%;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #17202a;
      }

      .dragon-nostril-left {
        left: 30%;
      }

      .dragon-nostril-right {
        right: 30%;
      }

      .dragon-mouth {
        position: absolute;
        left: 50%;
        top: -8px;
        width: 20px;
        height: 12px;
        border: 3px solid #17202a;
        border-bottom: 0;
        border-radius: 999px 999px 0 0;
        background: #ff715b;
        transform: translateX(-50%);
      }

      .dragon-neck {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: clamp(58px, 9vmin, 86px);
        height: 58px;
        border: 4px solid #17202a;
        border-bottom: 0;
        border-radius: 42px 42px 0 0;
        background: linear-gradient(180deg, #28a745, #176f36);
        transform: translateX(-50%);
      }

      .dragon-pivot {
        position: absolute;
        left: 50%;
        bottom: 34px;
        width: 1px;
        height: 1px;
      }

      @keyframes laser-fade {
        to {
          opacity: 0;
          transform: var(--laser-transform) scaleX(0.86);
        }
      }

      @keyframes spark-pop {
        to {
          opacity: 0;
          transform: translate(-50%, -50%) scale(2.4);
        }
      }

      @keyframes fire-burst {
        to {
          opacity: 0;
          filter: blur(1px);
          transform: var(--fire-transform) scaleX(0.82) scaleY(1.28);
        }
      }

      @keyframes ember-pop {
        to {
          opacity: 0;
          transform: translate(var(--ember-x), var(--ember-y)) scale(0.35);
        }
      }

      @keyframes cannon-ball-flight {
        0% {
          opacity: 1;
          transform: translate(var(--ball-start-x), var(--ball-start-y)) translate(-50%, -50%) scale(1);
        }

        60% {
          transform: translate(var(--ball-mid-x), var(--ball-mid-y)) translate(-50%, -50%) scale(1.04);
        }

        100% {
          opacity: 0.96;
          transform: translate(var(--ball-end-x), var(--ball-end-y)) translate(-50%, -50%) scale(0.9);
        }
      }

      @keyframes cannon-smoke-puff {
        to {
          opacity: 0;
          filter: blur(1px);
          transform: translate(-50%, -50%) scale(2.2);
        }
      }

      @keyframes rocket-flight {
        0% {
          opacity: 1;
          transform: translate(var(--rocket-start-x), var(--rocket-start-y)) translate(-50%, -50%) rotate(var(--rocket-rotation)) scale(0.86);
        }

        58% {
          transform: translate(var(--rocket-mid-x), var(--rocket-mid-y)) translate(-50%, -50%) rotate(var(--rocket-rotation)) scale(1);
        }

        100% {
          opacity: 0.98;
          transform: translate(var(--rocket-end-x), var(--rocket-end-y)) translate(-50%, -50%) rotate(var(--rocket-rotation)) scale(0.92);
        }
      }

      @keyframes rocket-trail-fade {
        to {
          opacity: 0;
          filter: blur(1px);
          transform: var(--rocket-trail-transform) scaleX(0.82);
        }
      }

      @keyframes arrow-flight {
        0% {
          opacity: 1;
          transform: var(--arrow-start-transform) scale(0.92);
        }

        100% {
          opacity: 0.96;
          transform: var(--arrow-end-transform) scale(1);
        }
      }

      @keyframes bullet-flight {
        0% {
          opacity: 1;
          transform: var(--bullet-start-transform) scale(0.85);
        }

        100% {
          opacity: 0.94;
          transform: var(--bullet-end-transform) scale(1);
        }
      }

      @keyframes six-shooter-flash-fade {
        to {
          opacity: 0;
          transform: translate(-50%, -50%) rotate(var(--flash-rotation)) scale(1.8);
        }
      }

      @keyframes word-flash {
        0%,
        100% {
          background: #ffffff;
          box-shadow: 0 12px 28px rgba(23, 32, 42, 0.22);
        }

        50% {
          background: #fff07a;
          box-shadow: 0 0 0 8px rgba(255, 240, 122, 0.22), 0 12px 28px rgba(23, 32, 42, 0.22);
        }
      }

      @media (max-width: 640px) {
        .arena {
          min-height: 420px;
        }

        .word-token {
          min-width: 98px;
          border-width: 3px;
        }

        .sound-button {
          width: 52px;
          height: 52px;
          font-size: 27px;
        }
      }
    </style>
  </head>
  <body>
    <main id="arena" class="arena laser-scene" aria-label="Shooting words game">
      <div class="scene-visual" aria-hidden="true"></div>
      <div id="wordLayer" class="word-layer"></div>
      <div id="laserLayer" class="laser-layer"></div>
      <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>

      <button id="soundButton" class="sound-button" type="button" aria-label="Hear the word again" hidden>🔊</button>

      <div id="shooterPicker" class="shooter-picker" aria-label="Choose shooter" hidden>
        <button class="shooter-choice-button" type="button" data-shooter-choice="laser" aria-label="Use laser gun">
          <span class="shooter-choice-icon" aria-hidden="true">⚡</span>
          <span>Laser</span>
        </button>
        <button class="shooter-choice-button" type="button" data-shooter-choice="dragon" aria-label="Use dragon">
          <span class="shooter-choice-icon" aria-hidden="true">🐉</span>
          <span>Dragon</span>
        </button>
        <button class="shooter-choice-button" type="button" data-shooter-choice="cannon" aria-label="Use cannon">
          <span class="shooter-choice-icon" aria-hidden="true">●</span>
          <span>Cannon</span>
        </button>
        <button class="shooter-choice-button" type="button" data-shooter-choice="rocket" aria-label="Use rocket">
          <span class="shooter-choice-icon" aria-hidden="true">🚀</span>
          <span>Rocket</span>
        </button>
        <button class="shooter-choice-button" type="button" data-shooter-choice="bow" aria-label="Use bow">
          <span class="shooter-choice-icon" aria-hidden="true">🏹</span>
          <span>Bow</span>
        </button>
        <button class="shooter-choice-button" type="button" data-shooter-choice="cowboy" aria-label="Use cowboy">
          <span class="shooter-choice-icon" aria-hidden="true">🤠</span>
          <span>Cowboy</span>
        </button>
      </div>

      <div id="gun" class="gun laser-mode" aria-hidden="true">
        <div id="barrel" class="barrel">
          <div class="barrel-tip"></div>
        </div>
        <div id="gunPivot" class="gun-pivot"></div>
        <div class="gun-body"></div>
        <div class="stand"></div>
        <div id="rocketVehicle" class="rocket-vehicle">
          <div class="rocket-body"></div>
          <div class="rocket-window"></div>
          <div class="rocket-stripe"></div>
          <div class="rocket-fin rocket-fin-left"></div>
          <div class="rocket-fin rocket-fin-right"></div>
          <div class="rocket-flame"></div>
        </div>
        <div id="rocketPivot" class="rocket-pivot"></div>
        <div class="launch-pad"></div>
        <div id="bowWeapon" class="bow-weapon">
          <div class="bow-arc"></div>
          <div class="bow-string"></div>
          <div class="bow-ready-arrow"></div>
          <div class="bow-grip"></div>
        </div>
        <div id="bowPivot" class="bow-pivot"></div>
        <div class="cowboy-figure">
          <div class="cowboy-hat"></div>
          <div class="cowboy-head"></div>
          <div class="cowboy-body"></div>
          <div id="cowboyArm" class="cowboy-arm">
            <div class="cowboy-sleeve"></div>
            <div class="cowboy-hand"></div>
            <div class="six-shooter"></div>
          </div>
        </div>
        <div id="cowboyPivot" class="cowboy-pivot"></div>
        <div class="dragon-neck"></div>
        <div id="dragonHead" class="dragon-head">
          <div class="dragon-crest"></div>
          <div class="dragon-horn dragon-horn-left"></div>
          <div class="dragon-horn dragon-horn-right"></div>
          <div class="dragon-snout">
            <span class="dragon-nostril dragon-nostril-left"></span>
            <span class="dragon-nostril dragon-nostril-right"></span>
            <div id="dragonMouth" class="dragon-mouth"></div>
          </div>
          <div class="dragon-eye dragon-eye-left"></div>
          <div class="dragon-eye dragon-eye-right"></div>
        </div>
        <div id="dragonPivot" class="dragon-pivot"></div>
      </div>

      <div id="startScreen" class="start-screen">
        <button id="startButton" class="start-button" type="button" disabled>Start</button>
      </div>

      <div id="error" class="error" role="alert" hidden></div>

      <button id="settingsToggle" class="settings-toggle" type="button" aria-label="Open settings">⚙</button>

      <aside id="settingsPanel" class="settings-panel" aria-label="Game settings" aria-hidden="true">
        <form id="passwordForm" class="settings-form">
          <h2 class="settings-title">Settings</h2>
          <label class="field">
            Password
            <input id="settingsPassword" type="password" autocomplete="current-password">
          </label>
          <div id="passwordStatus" class="settings-status" aria-live="polite"></div>
        </form>

        <form id="settingsForm" class="settings-form" hidden>
          <h2 class="settings-title">Word Data</h2>
          <div class="settings-actions">
            <button id="fullscreenSettingsButton" class="settings-action" type="button">Full screen settings</button>
          </div>
          <div class="settings-actions">
            <button id="importButton" class="settings-action" type="button">Import data</button>
            <button id="clearDatabaseButton" class="settings-action danger" type="button">Clear database</button>
          </div>
          <input id="importFileInput" type="file" accept=".csv,text/csv" hidden>

          <section class="settings-section" aria-labelledby="metricsSettingsTitle">
            <h3 id="metricsSettingsTitle" class="settings-section-title">Metrics</h3>
            <div class="settings-actions">
              <button id="importMetricsButton" class="settings-action" type="button">Import metrics</button>
              <button id="exportMetricsButton" class="settings-action" type="button">Export metrics</button>
              <button id="showMetricsButton" class="settings-action" type="button">Show metrics</button>
              <button id="clearMetricsButton" class="settings-action danger" type="button">Clear metrics</button>

      async function init() {
        try {
          state.db = await openDatabase();
          state.dbRows = await readAllRows();
          loadSavedSettings();
          applyCurrentFilters();
          rebuildSettingsControls();
          updateAim();

          if (state.dbRows.length === 0) {
            startButtonEl.disabled = true;
            openSettingsPanel();
            showPasswordForm();
            setPasswordStatus("Import teaching-reading-words.csv to choose words for the game.");
          }
        } catch (error) {
          showError(`${error.message} IndexedDB needs a normal browser page context; run this page from the local web server.`);
        }
      }

      startButtonEl.addEventListener("click", () => {
        if (state.words.length < MIN_WORDS) {
          openSettingsPanel();
          showPasswordForm();
          setPasswordStatus("Import data and apply a word set before starting.");
          return;
        }

        state.running = true;
        state.correctStreak = 0;
        resetShooterPickerProgress();
        startScreenEl.hidden = true;
        soundButtonEl.hidden = false;
        unlockSpeech();
        startRound();
      });

      soundButtonEl.addEventListener("click", (event) => {
        event.stopPropagation();
        if (state.target) {
          speakWord(state.target.word);
        }
      });

      arenaEl.addEventListener("pointermove", (event) => {
        state.pointer.x = event.clientX;
        state.pointer.y = event.clientY;
        updateAim();
      });

      arenaEl.addEventListener("pointerdown", (event) => {
        if (
          !state.running ||
          state.locked ||
          !isAllowedShotPointer(event) ||
          isShotControlTarget(event.target)
        ) {
          return;
        }

        event.preventDefault();
        state.pointer.x = event.clientX;
        state.pointer.y = event.clientY;
        updateAim();
        shootAt(event.clientX, event.clientY);

        const hits = findHitWords(event.clientX, event.clientY);
        if (hits.length === 0) {
          return;
        }

        const correctHit = hits.find((token) => token.word === state.target.word);
        if (correctHit) {
          recordGuess(true);
          finishRound("correct", correctHit);
        } else {
          recordGuess(false);
          handleWrongGuess();
        }
      });

      arenaEl.addEventListener("contextmenu", (event) => {
        if (isGameShotTarget(event.target)) {
          event.preventDefault();
        }
      });

      shooterPickerEl.addEventListener("click", (event) => {

        }

        chooseShooterFromPicker(button.dataset.shooterChoice);

      settingsToggleEl.addEventListener("click", () => {

          const rows = validateTeachingCsv(text);
